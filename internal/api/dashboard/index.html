<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS3 Backup Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;background:#1a1a2e;color:#e0e0e0;line-height:1.5;min-height:100vh;padding:20px}
.container{max-width:1200px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:#16213e;border-radius:12px;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.header-title h1{font-size:22px;font-weight:700;color:#fff}
.header-title .subtitle{font-size:12px;color:#8892b0}
.connection-status{display:flex;align-items:center;gap:8px;font-size:14px}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.status-dot.connected{background:#4caf50;box-shadow:0 0 6px #4caf50}
.status-dot.disconnected{background:#f44336;box-shadow:0 0 6px #f44336}
.error-banner{display:none;padding:12px 20px;background:#3a1a1a;border:1px solid #f44336;border-radius:8px;margin-bottom:16px;color:#ff8a80;font-size:14px}
.error-banner.visible{display:block}
.status-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.status-card{background:#16213e;border-radius:10px;padding:16px 20px;border:1px solid #0f3460;display:flex;flex-direction:column;gap:4px}
.status-card .label{font-size:12px;color:#8892b0;text-transform:uppercase;letter-spacing:.5px}
.status-card .value{font-size:18px;font-weight:600;color:#fff}
.status-card .value.running{color:#4caf50}
.status-card .value.stopped{color:#f44336}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .2s}
.btn-primary{background:#0f3460;color:#e0e0e0;border-color:#1a5276}
.btn-primary:hover{background:#1a5276}
.btn-danger{background:#4a1a1a;color:#ff8a80;border-color:#6a2a2a}
.btn-danger:hover{background:#6a2a2a}
.btn-success{background:#1a3a1a;color:#81c784;border-color:#2a5a2a}
.btn-success:hover{background:#2a5a2a}
.btn-outline{background:transparent;color:#8892b0;border-color:#0f3460}
.btn-outline:hover{background:#0f3460;color:#e0e0e0}
.btn-sm{padding:4px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.actions-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.section{margin-bottom:24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-header h2{font-size:16px;font-weight:600;color:#ccd6f6}
.jobs-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:12px}
.job-card{background:#16213e;border-radius:10px;border:1px solid #0f3460;overflow:hidden}
.job-card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#1a2744;border-bottom:1px solid #0f3460}
.job-card-header .job-name{font-weight:600;color:#ccd6f6}
.job-card-header .job-id{font-size:11px;color:#8892b0;font-family:monospace}
.job-card-body{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.job-info-row{display:flex;justify-content:space-between;font-size:13px}
.job-info-row .info-label{color:#8892b0}
.job-info-row .info-value{color:#e0e0e0}
.job-actions{display:flex;gap:8px;margin-top:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.3px}
.badge-completed{background:#1a3a1a;color:#81c784}
.badge-failed{background:#3a1a1a;color:#ff8a80}
.badge-running{background:#3a3a1a;color:#ffd54f}
.badge-never{background:#2a2a3e;color:#8892b0}
.history-toggle{width:100%;padding:8px 16px;background:#0f3460;color:#8892b0;border:none;cursor:pointer;font-size:13px;text-align:left;display:flex;align-items:center;gap:6px;transition:background .2s}
.history-toggle:hover{background:#1a5276;color:#e0e0e0}
.history-toggle .arrow{transition:transform .2s}
.history-toggle .arrow.open{transform:rotate(90deg)}
.history-content{max-height:0;overflow:hidden;transition:max-height .3s ease}
.history-content.open{max-height:600px}
.history-table-wrap{overflow-x:auto}
.history-table{width:100%;border-collapse:collapse;font-size:12px}
.history-table th{background:#0f3460;color:#8892b0;padding:8px 10px;text-align:left;font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.3px;white-space:nowrap;position:sticky;top:0}
.history-table td{padding:7px 10px;border-bottom:1px solid #0a1a2e;white-space:nowrap}
.history-table tr:nth-child(even) td{background:rgba(15,52,96,.15)}
.history-table tr:hover td{background:rgba(15,52,96,.3)}
.history-table .error-cell{color:#ff8a80;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-empty{padding:16px;text-align:center;color:#8892b0;font-size:13px}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:#8892b0;gap:8px}
.spinner{width:20px;height:20px;border:2px solid #0f3460;border-top-color:#e0e0e0;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{padding:32px;text-align:center;color:#8892b0}
.empty-state h3{color:#ccd6f6;margin-bottom:8px}
.toast-container{position:fixed;bottom:20px;right:20px;z-index:1000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:8px;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.3);animation:slideIn .3s ease;max-width:360px}
.toast-success{background:#1a3a1a;border:1px solid #4caf50;color:#81c784}
.toast-error{background:#3a1a1a;border:1px solid #f44336;color:#ff8a80}
.toast-info{background:#0f3460;border:1px solid #2196f3;color:#90caf9}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:1000;justify-content:center;align-items:center}
.modal-overlay.open{display:flex}
.modal{background:#112240;border:1px solid #1a5276;border-radius:12px;width:480px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.5);max-height:90vh;display:flex;flex-direction:column}
.modal-wide{width:700px}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #1a5276;flex-shrink:0}
.modal-header h3{margin:0;color:#e0e0e0;font-size:16px}
.modal-close{background:none;border:none;color:#8892b0;font-size:24px;cursor:pointer;padding:0;line-height:1}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid #1a5276;flex-shrink:0}
.form-group{margin-bottom:14px}
.form-group label{display:block;color:#8892b0;font-size:12px;margin-bottom:4px}
.form-group input{width:100%;padding:8px 10px;border:1px solid #1a5276;border-radius:6px;background:#0a192f;color:#e0e0e0;font-size:13px;box-sizing:border-box}
.form-group input:focus{outline:none;border-color:#3498db}
.input-row{display:flex;gap:8px}
.input-row input{flex:1}
.footer{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid #0f3460;margin-top:24px;font-size:12px;color:#8892b0}
pre.logs-content{margin:0;font-size:11px;line-height:1.4;color:#a8b2d1;white-space:pre-wrap;word-break:break-all}
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="header-title">
      <div>
        <h1>DS3 Backup</h1>
        <div class="subtitle">Desktop Backup Daemon</div>
      </div>
    </div>
    <div class="connection-status">
      <span class="status-dot disconnected" id="connDot"></span>
      <span id="connText">Connecting...</span>
    </div>
  </header>

  <div class="error-banner" id="errorBanner">
    ⚠ <span id="errorText">Connection to daemon lost</span>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="status-card">
      <span class="label">Scheduler</span>
      <span class="value" id="schedulerStatus">—</span>
    </div>
    <div class="status-card">
      <span class="label">Scheduled Jobs</span>
      <span class="value" id="scheduledCount">—</span>
    </div>
    <div class="status-card">
      <span class="label">API Port</span>
      <span class="value" id="apiPort">—</span>
    </div>
    <div class="status-card">
      <span class="label">Daemon Uptime</span>
      <span class="value" id="daemonUptime">—</span>
    </div>
  </div>

  <div class="actions-bar">
    <button class="btn btn-primary" id="btnStartScheduler" style="display:none" onclick="toggleScheduler()">▶ Start Scheduler</button>
    <button class="btn btn-danger" id="btnStopScheduler" onclick="toggleScheduler()">⏹ Stop Scheduler</button>
    <button class="btn btn-outline" onclick="loadLogs()">📋 Show Logs</button>
    <button class="btn btn-outline" onclick="refreshNow()">🔄 Refresh Now</button>
  </div>

  <div class="loading" id="loadingIndicator">
    <div class="spinner"></div>
    <span>Loading dashboard...</span>
  </div>

  <button class="btn btn-success" onclick="document.getElementById('addJobModal').classList.add('open')" style="margin-bottom:16px">+ Add Job</button>

  <div class="section" id="jobsSection" style="display:none">
    <div class="section-header">
      <h2>Backup Jobs</h2>
      <span id="jobCount" style="font-size:13px;color:#8892b0"></span>
    </div>
    <div class="jobs-container" id="jobsContainer"></div>
  </div>

  <div class="footer">
    <span id="lastRefresh">Last updated: —</span>
    <span id="refreshIndicator"></span>
  </div>
</div>

<div id="addJobModal" class="modal-overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <div class="modal-header">
      <h3>Add Backup Job</h3>
      <button class="modal-close" onclick="document.getElementById('addJobModal').classList.remove('open')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Job Name</label>
        <input type="text" id="newJobName" placeholder="e.g. Documents" />
      </div>
      <div class="form-group">
        <label>Source Directory</label>
        <div class="input-row">
          <input type="text" id="newJobPath" placeholder="/Users/name/Documents" />
          <button class="btn btn-outline btn-sm" onclick="document.getElementById('dirPicker').click()">Browse</button>
        </div>
        <input type="file" id="dirPicker" webkitdirectory style="display:none" onchange="document.getElementById('newJobPath').value=this.files[0]?.webkitRelativePath?.split('/')[0]||''" />
      </div>
      <div class="form-group">
        <label>Encryption Password</label>
        <input type="password" id="newJobPassword" placeholder="Enter encryption password" />
      </div>
      <div class="form-group">
        <label>Schedule (optional cron)</label>
        <input type="text" id="newJobCron" placeholder="e.g. 0 2 * * * (daily at 2am)" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="document.getElementById('addJobModal').classList.remove('open')">Cancel</button>
      <button class="btn btn-success" onclick="createJob()">Create Job</button>
    </div>
  </div>
</div>

<div id="logsModal" class="modal-overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal modal-wide">
    <div class="modal-header">
      <h3>Daemon Logs</h3>
      <button class="modal-close" onclick="document.getElementById('logsModal').classList.remove('open')">&times;</button>
    </div>
    <div class="modal-body" style="max-height:400px">
      <pre class="logs-content" id="logsContent">Loading...</pre>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="document.getElementById('logsModal').classList.remove('open')">Close</button>
    </div>
  </div>
</div>

<script>
const REFRESH_INTERVAL=30000;
let statusData=null,jobsData=null,historyCache={},refreshTimer=null,isRefreshing=false;

async function apiGet(path){const r=await fetch(path);if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}

async function loadDashboard(){
  if(isRefreshing)return;
  isRefreshing=true;
  try{
    const s=await apiGet('/api/v1/status');
    statusData=s;
    document.getElementById('schedulerStatus').textContent=s.schedulerRunning?'Running':'Stopped';
    document.getElementById('schedulerStatus').className='value '+(s.schedulerRunning?'running':'stopped');
    document.getElementById('scheduledCount').textContent=s.scheduledJobs||0;
    document.getElementById('apiPort').textContent=s.apiPort||'—';
    document.getElementById('daemonUptime').textContent=s.uptime||'—';
    document.getElementById('btnStartScheduler').style.display=s.schedulerRunning?'none':'';
    document.getElementById('btnStopScheduler').style.display=s.schedulerRunning?'':'none';
    const dot=document.getElementById('connDot'),txt=document.getElementById('connText'),bn=document.getElementById('errorBanner');
    dot.className='status-dot connected';txt.textContent='Connected';bn.classList.remove('visible');
    try{
      const j=await apiGet('/api/v1/jobs');
      jobsData=j;
      if(!j||j.length===0){
        document.getElementById('jobsSection').style.display='';
        document.getElementById('jobsContainer').innerHTML='<div class="empty-state"><h3>No backup jobs</h3><p>Click "+ Add Job" to create your first backup job.</p></div>';
      }else{
        document.getElementById('jobsSection').style.display='';
        document.getElementById('jobCount').textContent=j.length+' job(s)';
        var c=document.getElementById('jobsContainer');c.innerHTML='';
        for(var i=0;i<j.length;i++)c.appendChild(createJobCard(j[i]));
      }
    }catch(e){document.getElementById('jobsSection').style.display='none'}
    document.getElementById('loadingIndicator').style.display='none';
    document.getElementById('lastRefresh').textContent='Last updated: '+new Date().toLocaleTimeString();
  }catch(err){
    const dot=document.getElementById('connDot'),txt=document.getElementById('connText'),bn=document.getElementById('errorBanner');
    dot.className='status-dot disconnected';txt.textContent='Disconnected';bn.classList.add('visible');
  }
  isRefreshing=false;
}

function formatTime(iso){if(!iso)return'—';return new Date(iso).toLocaleString(undefined,{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}
function formatStatus(s){switch(s){case'completed':return'<span class="badge badge-completed">Completed</span>';case'failed':return'<span class="badge badge-failed">Failed</span>';case'running':return'<span class="badge badge-running">Running</span>';default:return'<span class="badge badge-never">'+(s||'—')+'</span>'}}
function formatBytes(b){if(!b||b===0)return'0';var u=['B','KB','MB','GB'],i=Math.floor(Math.log(b)/Math.log(1024));return(b/Math.pow(1024,i)).toFixed(1)+' '+u[i]}
function formatDuration(d){if(!d)return'—';if(typeof d==='string'){var n=parseInt(d);if(!isNaN(n))d=n}if(d<60)return Math.round(d)+'s';if(d<3600)return Math.floor(d/60)+'m '+Math.round(d%60)+'s';return Math.floor(d/3600)+'h '+Math.floor((d%3600)/60)+'m'}
function escapeHtml(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function formatCron(expr){
  if(!expr)return'—';
  var p=expr.trim().split(/\s+/);if(p.length!==5)return escapeHtml(expr);
  var m=p[0],h=p[1],dom=p[2],mon=p[3],dow=p[4],desc='';
  if(m==='*'&&h==='*'&&dom==='*'&&mon==='*'&&dow==='*')desc='Every minute';
  else if(m==='0'&&h==='*'&&dom==='*'&&mon==='*'&&dow==='*')desc='Every hour';
  else if(m==='0'&&dom==='*'&&mon==='*'&&dow==='*'){var hn=parseInt(h);desc=hn===0?'Midnight':hn===12?'Noon':hn>12?'Daily at '+(hn-12)+':00 PM':'Daily at '+hn+':00 AM'}
  else if(m.startsWith('*/'))desc='Every '+m.substring(2)+' minute(s)';
  else if(h.startsWith('*/'))desc='Every '+h.substring(2)+' hours';
  else if(h.includes(',')){desc='At '+h.split(',').map(function(x){var n=parseInt(x);return n===0?'midnight':n===12?'noon':n>12?(n-12)+' PM':n+' AM'}).join(', ');if(m!=='0')desc+=' minute '+m}
  else{var hn2=parseInt(h);desc=(hn2===0?'Midnight':hn2===12?'Noon':hn2>12?'Daily at '+(hn2-12)+':00 PM':'Daily at '+hn2+':00 AM')+(m!=='0'?' at minute '+m:'')}
  return'<span title="'+escapeHtml(expr)+'">'+escapeHtml(desc)+'</span>'
}

function createJobCard(job){
  var card=document.createElement('div');card.className='job-card';
  card.innerHTML=
    '<div class="job-card-header"><div><div class="job-name">'+escapeHtml(job.name||job.id)+'</div><div class="job-id">'+escapeHtml(job.id)+'</div></div><div>'+formatStatus()+'</div></div>'+
    '<div class="job-card-body">'+
    '<div class="job-info-row"><span class="info-label">Source</span><span class="info-value">'+escapeHtml(job.sourcePath||'—')+'</span></div>'+
    '<div class="job-info-row"><span class="info-label">Schedule</span><span class="info-value">'+(job.scheduleEnabled?formatCron(job.cronExpr):'Manual only')+'</span></div>'+
    '<div class="job-info-row"><span class="info-label">Next Run</span><span class="info-value">'+formatTime(job.nextRun)+'</span></div>'+
    '<div class="job-info-row"><span class="info-label">Retention</span><span class="info-value">'+(job.retentionDays||'—')+' days</span></div>'+
    (job.lastError?'<div class="job-info-row"><span class="info-label" style="color:#ff8a80">Last Error</span><span class="info-value" style="color:#ff8a80">'+escapeHtml(job.lastError)+'</span></div>':'')+
    '<div class="job-actions"><button class="btn btn-primary btn-sm" onclick="triggerBackup(\''+job.id+'\')" id="runBtn-'+job.id+'">▶ Run Backup</button></div></div>'+
    '<button class="history-toggle" onclick="toggleHistory(\''+job.id+'\')"><span class="arrow" id="arrow-'+job.id+'">▶</span> Show History</button>'+
    '<div class="history-content" id="history-'+job.id+'"><div class="loading" id="historyLoading-'+job.id+'"><div class="spinner"></div><span>Loading history...</span></div></div>';
  return card;
}

async function toggleHistory(jobId){
  var el=document.getElementById('history-'+jobId),ar=document.getElementById('arrow-'+jobId);
  if(el.classList.contains('open')){el.classList.remove('open');ar.className='arrow';return}
  el.classList.add('open');ar.className='arrow open';
  if(el.querySelector('.loading')){
    try{
      var runs=historyCache[jobId];
      if(!runs){var d=await apiGet('/api/v1/jobs/'+jobId+'/history');runs=d.runs||[];historyCache[jobId]=runs}
      if(!runs||runs.length===0){el.innerHTML='<div class="history-empty">No backup runs yet.</div>';return}
      var h='<div class="history-table-wrap"><table class="history-table"><thead><tr><th>Date/Time</th><th>Status</th><th>Added</th><th>Changed</th><th>Size</th><th>Duration</th></tr></thead><tbody>';
      for(var i=0;i<runs.length;i++){var r=runs[i];h+='<tr><td>'+formatTime(r.runTime||r.startTime)+'</td><td>'+formatStatus(r.status)+'</td><td>'+(r.filesAdded||0)+'</td><td>'+(r.filesChanged||0)+'</td><td>'+formatBytes(r.bytesUploaded||0)+'</td><td>'+formatDuration(r.duration||0)+'</td></tr>'}
      h+='</tbody></table></div>';el.innerHTML=h;
    }catch(e){el.querySelector('.loading').innerHTML='<div class="history-empty">Failed to load history</div>'}
  }
}

async function triggerBackup(jobId){
  var btn=document.getElementById('runBtn-'+jobId);if(btn)btn.disabled=true;
  try{var r=await fetch('/api/v1/backup/run/'+jobId,{method:'POST'});if(!r.ok)throw new Error('HTTP '+r.status);showToast('Backup triggered','success')}
  catch(e){showToast('Failed: '+e.message,'error')}
  if(btn)btn.disabled=false;
}

async function toggleScheduler(){
  var running=statusData&&statusData.schedulerRunning;
  try{var r=await fetch(running?'/api/v1/stop':'/api/v1/start',{method:'POST'});if(!r.ok)throw new Error('HTTP '+r.status);showToast(running?'Scheduler stopped':'Scheduler started',running?'info':'success');await loadDashboard()}
  catch(e){showToast('Failed: '+e.message,'error')}
}

function refreshNow(){loadDashboard()}

async function loadLogs(){
  document.getElementById('logsModal').classList.add('open');
  document.getElementById('logsContent').textContent='Loading...';
  try{
    var r=await fetch('/api/v1/logs');if(!r.ok)throw new Error('HTTP '+r.status);
    document.getElementById('logsContent').textContent=await r.text()||'(no logs)';
  }catch(e){document.getElementById('logsContent').textContent='Failed to load logs: '+e.message+'\n\n(Try: tail -100 ~/.ds3backup/ds3backup.log)'}
}

async function createJob(){
  var nm=document.getElementById('newJobName').value.trim(),p=document.getElementById('newJobPath').value.trim(),pw=document.getElementById('newJobPassword').value,cr=document.getElementById('newJobCron').value.trim();
  if(!nm){showToast('Job name is required','error');return}if(!p){showToast('Source directory is required','error');return}if(!pw){showToast('Encryption password is required','error');return}
  document.getElementById('addJobModal').classList.remove('open');
  try{
    var r=await fetch('/api/v1/jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:nm,sourcePath:p,password:pw,cronExpr:cr})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    showToast('Job "'+nm+'" created!','success');
    document.getElementById('newJobName').value='';document.getElementById('newJobPath').value='';document.getElementById('newJobPassword').value='';document.getElementById('newJobCron').value='';
    await loadDashboard();
  }catch(e){showToast('Failed: '+e.message,'error')}
}

function showToast(msg,type){
  var c=document.getElementById('toastContainer');
  if(!c){c=document.createElement('div');c.className='toast-container';c.id='toastContainer';document.body.appendChild(c)}
  var t=document.createElement('div');t.className='toast toast-'+type;t.textContent=msg;c.appendChild(t);
  setTimeout(function(){t.remove()},3000);
}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('refreshIndicator').textContent='Auto-refresh every '+(REFRESH_INTERVAL/1000)+'s';
  loadDashboard();refreshTimer=setInterval(loadDashboard,REFRESH_INTERVAL);
});
</script>
</body>
